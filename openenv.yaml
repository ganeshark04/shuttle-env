spec_version: 1
name: shuttle-routing-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: Dynamic routing of office shuttles based on real-time employee demand

tasks:
  - name: easy
    description: Single shuttle with few employees
    grader: server.env.EasyGrader
  - name: medium
    description: Multiple shuttles and employees
    grader: server.env.MediumGrader
  - name: hard
    description: Complex routing with many employees
    grader: server.env.HardGrader

authors:
  - GAGAN RAO K
  - NUTHAN KUMAR K
  - PRABHAKARA R

version: 1.0
